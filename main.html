<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">

	<style>
        /* Main container */
        .testimonial-section {
            background-color: #f5f5f5;
            padding: 30px;
            font-family: serif;
        }

        h2 {
            margin-bottom: 20px;
        }

        /* Individual testimonial box */
        .testimonial {
            background-color: #ffffff;
            border: 1px solid #ddd;
            padding: 15px;
            margin-bottom: 15px;
        }

        /* Author styling */
        .author {
            text-align: right;
            font-style: italic;
            margin-top: 10px;
        }
    </style>
</head>

<body>
	<!-- the entire body must be written by student -->

	<div class="testimonial-section">
        <h2>Testimonials</h2>

        <div class="testimonial">
            <p>This product is amazing! I highly recommend it to anyone in need of a solution like this.</p>
            <p class="author">- John Doe</p>
        </div>

        <div class="testimonial">
            <p>I have been using this for a few weeks now and it has completely transformed my workflow.</p>
            <p class="author">- Jane Smith</p>
        </div>
    </div>

    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
